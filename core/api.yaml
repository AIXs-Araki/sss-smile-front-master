openapi: 3.1.0
info:
  title: SSS Web API
  version: "1.0"
  description: |
    This is the Safety Sheep Sensor system Web API.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GeneralResponse200:
      type: object
      properties:
        Result:
          type: boolean
          description: 結果判定
        Message:
          type: string
          description: 本文
    GeneralError:
      type: object
      description: エラーレスポンス
      properties:
        code:
          type: integer
          format: int32
          description: エラーコード
        message:
          type: string
          description: エラーメッセージ
tags:
  - name: loginsys
    description: Log into the system
  - name: loginmon
    description: Log into the monitor application
  - name: login
    description: Log into the mobile application
  - name: logoutsys
    description: Log out of the system
  - name: logoutmon
    description: Log out of the monitor application
  - name: logout
    description: Log out of the mobile application
  - name: corplist
    description: Corporations list operations
  - name: facility
    description: Facility operations
  - name: userlist
    description: Users list operations
  - name: alert
    description: Alert operations
  - name: clearalert
    description: Alert clearing operations
  - name: device
    description: Device operations
  - name: condition
    description: Sensor gateway condition operations
  - name: userdata
    description: User data operations
  - name: userdatafile
    description: User data files operations
  - name: userdatamatrix
    description: User data matrix operations
  - name: userdatamatrixsort
    description: User data matrix sortings
  - name: alertsetting
    description: Alert settings operations
  - name: stafflist
    description: Staff list operations
  - name: userinfo
    description: User information operations
  - name: choice
    description: Get any choices
  - name: roomlist
    description: Rooms list operations
  - name: groupname
    description: Group name operations
  - name: authcode
    description: Authetication code operations
  - name: authcodereq
    description: Authetication code requests
  - name: resetpwd
    description: Reset password operations
  - name: resetpwdreq
    description: Reset password requests
  - name: sending
    description: Any intervals sending operations
  - name: checkupdates
    description: Check any updates operations
  - name: pushnotifkey
    description: Push notifications key operations
  - name: getfacilitydata
    description: Get facility data operations
  - name: notifgroup
    description: Notifications group operations
x-tagGroups:
  - name: SystemManage
    tags:
      - loginsys
      - logoutsys
      - corplist
      - facility
      - userlist
      - alert
      - device
      - getfacilitydata
  - name: MonitorApplication
    tags:
      - loginmon
      - logoutmon
      - condition
      - userdatafile
      - userdatamatrixsort
      - alertsetting
      - stafflist
      - userinfo
      - choice
      - roomlist
      - groupname
      - authcodereq
      - resetpwd
  - name: SmartphoneApplication
    tags:
      - login
      - logout
      - authcode
      - resetpwdreq
      - pushnotifkey
      - notifgroup
  - name: ApplicationCommon
    tags:
      - clearalert
      - userdata
      - userdatamatrix
  - name: Gateway
    tags:
      - sending
      - checkupdates
paths:
  /systemmanage/login:
    post:
      tags:
        - loginsys
      summary: 【001.LoginSysMng】
      operationId: login_manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ID:
                  type: string
                  description: ログインID
                PW:
                  type: string
                  description: ログインPW
                EmployeeNumber:
                  type: string
                  description: 社員番号
              required:
                - ID
                - PW
                - EmployeeNumber
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema: 
                type: object
                properties:
                  ChallengeParameters:
                    type: object
                  AuthenticationResult:
                    type: object
                    properties:
                      AccessToken:
                        type: string
                        description: アクセストークン
                      ExpiresIn:
                        type: integer
                        example: 54000 
                      TokenType:
                        type: string
                        example: Bearer 
                      RefreshToken:
                        type: string
                      IdToken:
                        type: string
                      accountId:
                        type: string
                        format: uuid
                  ResponseMetadata:
                    type: object
                    properties:
                      RequestId:
                        type: string
                        format: uuid
                      HTTPStatusCode:
                        type: integer
                        example: 200 
                      HTTPHeaders:
                        type: object
                        properties:
                          date:
                            type: string
                            example: Thu, 03 Jul 2025 02:39:17 GMT
                          content-type:
                            type: string
                            example: application/x-amz-json-1.1
                          content-length:
                            type: integer
                            example: 4039 
                          connection:
                            type: string
                            example: keep-alive 
                          x-amzn-requestid:
                            type: string
                            format: uuid
                      RetryAttempts:
                        type: integer
                        example: 0
                  CookieData:
                    type: object
                    properties:
                      statement:
                        type: string
                      sign:
                        type: string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
        '401':
          description: Authetication error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
        '500':
          description: System error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
  /systemmanage/logout:
    post:
      tags:
        - logoutsys
      summary: 【002.LogoutSysMng】
      operationId: logout_manage
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: AccessToken
          required: true
          schema:
            type: string
          description: アクセストークン
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralResponse200'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
        '401':
          description: Authetication error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
        '500':
          description: System error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
