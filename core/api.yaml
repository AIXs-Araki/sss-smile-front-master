      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FacilityName:
                  type: string
                  description: 『施設名』データ
                Comment:
                  type: string
                  description: 『コメント』データ
                MonitorAppMailAddress:
                  type: string
                  format: email
                  description: 『モニタPCアプリ　メールアドレス』データ
                MonitorAppAccount:
                  type: string
                  description: 『モニタPCアプリ　アカウント』データ
                MonitorAppPassword:
                  type: string
                  format: password
                  description: 『モニタPCアプリ　パスワード』データ
                MobileApp:
                  type: array
                  items:
                    type: object
                    description: 『モバイルアプリ』データ
                    title: 『モバイルアプリ』データ
                    properties:
                      Account: 
                        type: string
                        description: 『モバイルアプリ　アカウント』データ
                      Password: 
                        type: string
                        format: password
                        description: 『モバイルアプリ　パスワード』データ
                      NotifGroup:
                        type: integer
                        minimum: 0
                        maximum: 255
                        description: アラートプッシュ通知を受け取るグループの設定、全部で8グループなので2^8=256通り、グループID=1を受け取るなら2^(1-1)=1、グループID=8を受け取るなら2^(8-1)=128、グループID=1と2を受け取るなら2^(1-1)+2^(2-1)=3、といった具合
                    required:
                      - Account
                      - Password
                SSSAPIAccount: 
                  type: string
                  description: 『安心ひつじAPI　アカウント』データ
                SSSAPIPassword: 
                  type: string
                  format: password
                  description: 『安心ひつじAPI　パスワード』データ
                ExternalCollaboCareKarteAPIKey:
                  type: string
                  description: 『外部連携　CAREKARTE　APIキー』データ
                ExternalCollaboCareKartePassword:
                  type: string
                  format: password
                  description: 『外部連携　CAREKARTE　パスワード』データ
                ExternalCollaboHonobonoLicenseKey:
                  type: string
                  description: 『外部連携　ほのぼの　ライセンスキー』データ
                NurseCallMaker:
                  type: string
                  description: 『ナースコール連携　メーカー選択』データ
                NurseCallMailAddress:
                  type: string
                  format: email
                  description: 『ナースコール連携　岩通用メールアドレス』データ
              required:
                - FacilityName
                - MonitorAppMailAddress
                - MonitorAppAccount
                - MonitorAppPassword
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                description: 新規施設登録の結果
                $ref: '#/components/schemas/GeneralResponse200'
        '400':
          description: Bad request.
