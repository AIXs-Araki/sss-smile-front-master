      operationId: periodic_sending_gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GatewayID:
                  type: string
                  description: ゲートウェイID
                PeriodicDataList:
                  type: array
                  items:
                    type: object
                    description: 定時送信データ
                    title: 定時送信データ
                    properties:
                      sensor_id:
                        type: string
                        example: CB0013
                        description: センサー番号（6桁英数字）
                      command:
                        type: string
                        example: 0x18
                        description: コマンド番号（4桁英数字、"0x18"固定）
                      timestamp:
                        type: string
                        example: 202506171230
                        description: タイムスタンプ（12桁数字、YYYYMMDDHHMN）
                      payload:
                        type: object
                        properties:
                          status: 
                            type: string
                            example: G
                            description: 状態：例 G/O/M
                          heart_rate_avg:
                            type: string
                            example: 072
                            description: 心拍（3桁数字、または "-"）
                          resp_rate_avg:
                            type: string
                            example: ー
                            description: 呼吸（3桁数字、または "-"）
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                  type: object
                  properties:
                    time:
                      type: string
                      format: date-time
                    SensorsList:
                      type: array
                      items:
                        type: object
                        properties:
                          sensor_id:
                            type: string
                            example: CB0013
                            description: センサー番号（6桁英数字）
                          config_update:
                            type: boolean
                            description: 設定値の変更がなかった場合、false
                          wakeup_alert:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                                description: true:ON,false:OFF
                              judge_time:
                                type: string
                                example: 07:30
                          getout_bed_alert:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                                description: true:ON,false:OFF
                              start_time:
                                type: string
                                example: 22:00
                              end_time:
                                type: string
                                example: 06:00
                              judge_duration:
                                type: string
                                example: 005
                          bedin_alert:
                            type: object
                            properties:
                              enabled:
                                  type: boolean
                                  description: true:ON,false:OFF
                              start_time:
                                  type: string
                                  example: 21:00
                              end_time:
                                  type: string
                                  example: 23:00
                              judge_duration:
                                  type: string
                                  example: 010
                          heart_rate_alert:
                            type: object
                            properties:
                              low_limit:
                                  type: string
                                  example: 040
                              high_limit:
                                  type: string
                                  example: 100
                              duration:
                                  type: string
                                  example: 010
                          breathing_alert:
                            type: object
                            properties:
                              low_limit:
                                  type: string
                                  example: 010
                              high_limit:
                                  type: string
                                  example: 030
                              duration:
                                  type: string
                                  example: 010
                          sensor_sensitivity:
                            type: integer
                            minimum: 1
                            maximum: 3
                            description: 1:AUTO,2:LOW,3:HIGH（項目マスタより）
                          getout_bed_judge_level:
                            type: integer
                            minimum: 1
                            maximum: 3
                            description: 1:AUTO,2:LOW,3:HIGH（項目マスタより）
                          bedin_judge_level:
                            type: integer
                            minimum: 1
                            maximum: 3
                            description: 1:AUTO,2:LOW,3:HIGH（項目マスタより）
                          alert_clear_button:
                            type: boolean
                            example: true:ON,false:OFF
        '400':
