                    description: 法人編集画面（施設管理画面）の表示データ
                    title: 法人編集画面（施設管理画面）の表示データ
                    properties:
                      CorpID:
                        type: integer
                        description: 法人ID（法人テーブルの主キーと一致）
                      CorpName:
                        type: string
                        description: 『法人名』データ
                      Comment:
                        type: string
                        description: 『コメント』データ
        '400':
